<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="app-header">
        <h1>Image Search</h1>
    </header>

    <main>
        <section id="search-section">
            <form id="search-form">
                <div class="search-input-wrapper">
                    <input type="text" id="search-input" name="query"
                           placeholder="自然言語で画像を検索…"
                           maxlength="500" autocomplete="off">
                    <button type="submit" id="search-button" disabled>検索</button>
                </div>
                <div id="char-count" class="char-count" hidden></div>
            </form>
        </section>

        <section id="query-info" hidden></section>

        <section id="results-section">
            <div id="results-header" hidden>
                <span id="results-count"></span>
            </div>
            <div id="result-grid" class="result-grid"></div>
            <div id="loading" class="loading" hidden>
                <div class="spinner"></div>
                <p>検索中...</p>
            </div>
            <div id="empty-message" class="empty-message" hidden>
                <p>該当する作品が見つかりませんでした</p>
            </div>
            <div id="error-message" class="error-message" hidden></div>
        </section>
    </main>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
