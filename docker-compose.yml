services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: artworks_v1
      LM_STUDIO_URL: http://host.docker.internal:1234
      EMBEDDING_SERVICE_URL: http://host.docker.internal:8100
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-/app/config/firebase-credentials.json}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-}
      FIREBASE_STORAGE_PREFIX: ${FIREBASE_STORAGE_PREFIX:-}
      VECTOR_DIM: 1152
    volumes:
      - ./config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  search:
    build:
      context: .
      dockerfile: services/search/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: artworks_v1
      EMBEDDING_SERVICE_URL: http://host.docker.internal:8100
      VECTOR_DIM: 1152
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  qdrant_data:
